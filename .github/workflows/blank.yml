import java.util.Scanner;

public class main.java {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);

        double consumo, valor;
        System.out.print("Digite o seu consumo: ");
        consumo = sc.nextDouble();

        if (consumo <= 10) {
            valor = 7.59;
        } else if (consumo <= 20) {
            valor = consumo * 1.31;
        } else if (consumo <= 30) {
            valor = consumo * 4.64;
        } else if (consumo <= 50) {
            valor = consumo * 6.62;
        } else if (consumo > 50) {
            valor = consumo * 7.31;
        }
        System.out.println("Valor da conta: R$ " + valor);
    }
}

 
